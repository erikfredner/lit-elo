{% load static %}
<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>
  {% include 'partials/nav.html' %}

  <section class="leaderboard">
    <h1>{{ page_title }}</h1>
    <p><a href="{% url 'core:home' %}">&larr; Home</a></p>

    <div id="chart-wrapper" style="position:relative;width:100%;height:500px;margin:2rem 0;">
      <canvas id="multi-elo-chart" style="position:absolute;top:0;left:0;width:100%;height:100%;display:block;"></canvas>
      {% for item in series %}
        {% if entity_type == 'author' %}
          <a href="{% url 'core:author_detail' pk=item.pk %}"
             class="chart-label"
             data-series-index="{{ forloop.counter0 }}"
             style="display:none;">{{ item.name }}</a>
        {% else %}
          <a href="{% url 'core:work_detail' pk=item.pk %}"
             class="chart-label"
             data-series-index="{{ forloop.counter0 }}"
             style="display:none;">{{ item.name }}</a>
        {% endif %}
      {% endfor %}
    </div>

    <script src="{% static 'js/multi-elo-chart.js' %}"></script>
    <script>
      var seriesData = {{ series_json|safe }};
      renderMultiEloChart('chart-wrapper', seriesData);
    </script>
  </section>
</body>
</html>
